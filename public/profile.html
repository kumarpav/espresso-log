<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Espresso Profile</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #1a1008; min-height: 100vh; color: #f0e6d3; }

  .hero { background: linear-gradient(160deg, #2a1508 0%, #1a1008 100%); border-bottom: 1px solid rgba(255,255,255,0.08); padding: 3rem 2rem 2rem; text-align: center; }
  .hero-icon { font-size: 3rem; margin-bottom: 0.75rem; }
  .hero-name { font-size: 2rem; font-weight: 800; color: #c8935a; letter-spacing: -0.5px; margin-bottom: 0.25rem; }
  .hero-sub { font-size: 0.85rem; color: rgba(255,255,255,0.35); }

  .stats-row { display: flex; justify-content: center; gap: 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
  .stat { padding: 1.25rem 2.5rem; text-align: center; border-right: 1px solid rgba(255,255,255,0.06); }
  .stat:last-child { border-right: none; }
  .stat-val { font-size: 2rem; font-weight: 800; color: #c8935a; line-height: 1; }
  .stat-label { font-size: 0.72rem; color: rgba(255,255,255,0.35); margin-top: 0.25rem; text-transform: uppercase; letter-spacing: 0.5px; }

  .content { max-width: 720px; margin: 0 auto; padding: 2rem 1.25rem; }
  .section-title { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.35); margin-bottom: 1rem; }

  .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.75rem; margin-bottom: 2.5rem; }
  .recipe-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(200,147,90,0.2); border-radius: 12px; padding: 1rem; }
  .recipe-name { font-weight: 700; color: #c8935a; margin-bottom: 0.2rem; }
  .recipe-roast { font-size: 0.78rem; color: rgba(255,255,255,0.45); margin-bottom: 0.5rem; }
  .recipe-metrics { display: flex; gap: 0.75rem; flex-wrap: wrap; }
  .metric { font-size: 0.78rem; color: rgba(255,255,255,0.45); }
  .metric strong { color: #f0e6d3; font-weight: 600; }

  .shot-list { display: flex; flex-direction: column; gap: 0.65rem; margin-bottom: 2.5rem; }
  .shot-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 1rem 1.1rem; }
  .shot-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.35rem; }
  .shot-roast { font-weight: 700; }
  .shot-stars { color: #c8935a; font-size: 0.8rem; }
  .shot-metrics { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 0.3rem; }
  .shot-tasting { font-size: 0.8rem; color: rgba(255,255,255,0.4); font-style: italic; }

  .footer { text-align: center; padding: 2rem; font-size: 0.8rem; color: rgba(255,255,255,0.2); }
  .footer a { color: #c8935a; text-decoration: none; }

  .empty { text-align: center; color: rgba(255,255,255,0.25); padding: 2rem; font-size: 0.88rem; }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-icon">☕</div>
  <div class="hero-name" id="display-name">Loading…</div>
  <div class="hero-sub">Espresso dial-in log</div>
</div>

<div class="stats-row" id="stats-row"></div>

<div class="content">
  <div id="recipes-section" style="display:none">
    <div class="section-title">Saved recipes</div>
    <div class="recipe-grid" id="recipes-grid"></div>
  </div>

  <div id="shots-section" style="display:none">
    <div class="section-title">Top shots</div>
    <div class="shot-list" id="shots-list"></div>
  </div>
</div>

<div class="footer">Built with <a href="/">Espresso Coach</a></div>

<script>
const starsHtml = n => '★'.repeat(n) + '☆'.repeat(5 - n);

async function load() {
  const token = new URLSearchParams(location.search).get('token') || '';
  const p = await fetch(`/api/profile?token=${encodeURIComponent(token)}`).then(r => r.json());

  document.title = `${p.display_name} · Espresso`;
  document.getElementById('display-name').textContent = p.display_name;

  document.getElementById('stats-row').innerHTML = `
    <div class="stat"><div class="stat-val">${p.total_shots}</div><div class="stat-label">Shots pulled</div></div>
    <div class="stat"><div class="stat-val">${p.avg_rating ? p.avg_rating + '★' : '—'}</div><div class="stat-label">Avg rating</div></div>
    <div class="stat"><div class="stat-val">${p.roasts_tried}</div><div class="stat-label">Roasts tried</div></div>
    <div class="stat"><div class="stat-val">${p.recipes.length}</div><div class="stat-label">Recipes saved</div></div>
  `;

  if (p.recipes.length) {
    document.getElementById('recipes-section').style.display = 'block';
    document.getElementById('recipes-grid').innerHTML = p.recipes.map(r => `
      <div class="recipe-card">
        <div class="recipe-name">${r.name}</div>
        <div class="recipe-roast">${r.roast}</div>
        <div class="recipe-metrics">
          <span class="metric">grind <strong>${r.grind_size}</strong></span>
          <span class="metric"><strong>${r.dose_g}g</strong>→<strong>${r.yield_g}g</strong></span>
          <span class="metric"><strong>${r.time_s}s</strong></span>
        </div>
      </div>`).join('');
  }

  if (p.top_shots.length) {
    document.getElementById('shots-section').style.display = 'block';
    document.getElementById('shots-list').innerHTML = p.top_shots.map(s => `
      <div class="shot-card">
        <div class="shot-header">
          <span class="shot-roast">${s.roast}</span>
          <span class="shot-stars">${starsHtml(s.rating)}</span>
        </div>
        <div class="shot-metrics">
          <span class="metric"><strong>${s.dose_g}g</strong> in</span>
          <span class="metric"><strong>${s.yield_g}g</strong> out</span>
          <span class="metric"><strong>${s.time_s}s</strong></span>
          <span class="metric">grind <strong>${s.grind_size}</strong></span>
          <span class="metric">ratio <strong>1:${s.ratio}</strong></span>
        </div>
        ${s.tasting_notes ? `<div class="shot-tasting">"${s.tasting_notes}"</div>` : ''}
      </div>`).join('');
  }
}

load();
</script>
</body>
</html>
